<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LogiFlow — Time & Capacity Order Distribution</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a0f1e;
      --navy-2: #0d1428;
      --navy-3: #111a36;
      --navy-4: #162040;
      --amber: #f59e0b;
      --amber-2: #fbbf24;
      --amber-dim: rgba(245,158,11,0.15);
      --teal: #14b8a6;
      --rose: #f43f5e;
      --green: #10b981;
      --border: rgba(255,255,255,0.07);
      --text-muted: rgba(255,255,255,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif;
      background: var(--navy);
      color: #e2e8f0;
      min-height: 100vh;
    }
    .mono { font-family: 'Space Mono', monospace; }
    .sidebar {
      width: 240px;
      background: var(--navy-2);
      border-right: 1px solid var(--border);
      height: 100vh;
      position: fixed;
      top: 0; left: 0;
      display: flex;
      flex-direction: column;
      z-index: 50;
    }
    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: var(--amber);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: var(--navy);
      margin-bottom: 10px;
      clip-path: polygon(0 0, 85% 0, 100% 15%, 100% 100%, 15% 100%, 0 85%);
    }
    .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; font-family: 'Space Mono', monospace; }
    .nav-section { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .nav-section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); padding: 8px 8px 6px; font-family: 'Space Mono', monospace; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 2px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      border: 1px solid transparent;
    }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: #e2e8f0; }
    .nav-item.active {
      background: var(--amber-dim);
      color: var(--amber);
      border-color: rgba(245,158,11,0.2);
    }
    .nav-icon { width: 18px; height: 18px; flex-shrink: 0; }
    .main-content {
      margin-left: 240px;
      min-height: 100vh;
      background: var(--navy);
    }
    .topbar {
      height: 60px;
      background: var(--navy-2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      position: sticky; top: 0; z-index: 40;
    }
    .page-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
    .page-subtitle { font-size: 11px; color: var(--text-muted); font-family: 'Space Mono', monospace; margin-top: 1px; }
    .status-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
      color: #10b981;
      padding: 5px 12px;
      border-radius: 100px;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .page-content { padding: 28px; }

    /* Cards */
    .stat-card {
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.12); }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.amber::before { background: var(--amber); }
    .stat-card.teal::before { background: var(--teal); }
    .stat-card.rose::before { background: var(--rose); }
    .stat-card.green::before { background: var(--green); }
    .stat-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); font-family: 'Space Mono', monospace; }
    .stat-value { font-size: 38px; font-weight: 800; letter-spacing: -2px; margin: 8px 0 4px; line-height: 1; }
    .stat-delta { font-size: 12px; color: var(--text-muted); font-family: 'Space Mono', monospace; }
    .stat-icon { position: absolute; top: 20px; right: 20px; opacity: 0.12; }

    /* Chart */
    .chart-card {
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .chart-sub { font-size: 11px; color: var(--text-muted); font-family: 'Space Mono', monospace; margin-bottom: 20px; }

    /* Form */
    .form-card {
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      max-width: 520px;
    }
    .form-group { margin-bottom: 20px; }
    .form-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); font-family: 'Space Mono', monospace; margin-bottom: 8px; display: block; }
    .form-input, .form-select {
      width: 100%;
      background: var(--navy-4);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      transition: border-color 0.15s;
      outline: none;
    }
    .form-input:focus, .form-select:focus { border-color: var(--amber); }
    .form-select option { background: var(--navy-3); }
    .btn-primary {
      background: var(--amber);
      color: var(--navy);
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 0.5px;
      padding: 13px 28px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 8px;
      font-family: 'Syne', sans-serif;
    }
    .btn-primary:hover { background: var(--amber-2); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-danger {
      background: rgba(244,63,94,0.1);
      color: var(--rose);
      border: 1px solid rgba(244,63,94,0.2);
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Syne', sans-serif;
    }
    .btn-danger:hover { background: rgba(244,63,94,0.2); }

    /* Allocation success box */
    .allocation-result {
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
    }
    .allocation-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #10b981; font-family: 'Space Mono', monospace; margin-bottom: 8px; }
    .allocation-slot { font-size: 22px; font-weight: 800; color: #10b981; letter-spacing: -0.5px; }
    .allocation-detail { font-size: 12px; color: var(--text-muted); font-family: 'Space Mono', monospace; margin-top: 4px; }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left;
      padding: 10px 16px;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      border-bottom: 1px solid var(--border);
      font-weight: 400;
    }
    .data-table td {
      padding: 14px 16px;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }
    .table-wrap {
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .table-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .table-title { font-size: 14px; font-weight: 700; }
    .table-count { font-size: 11px; color: var(--text-muted); font-family: 'Space Mono', monospace; }

    /* Status pills */
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 100px;
      font-size: 11px; font-weight: 700;
      font-family: 'Space Mono', monospace;
    }
    .pill-green { background: rgba(16,185,129,0.12); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
    .pill-amber { background: rgba(245,158,11,0.12); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
    .pill-rose { background: rgba(244,63,94,0.12); color: var(--rose); border: 1px solid rgba(244,63,94,0.2); }
    .pill-gray { background: rgba(255,255,255,0.06); color: var(--text-muted); border: 1px solid var(--border); }

    /* Capacity bar */
    .cap-bar-wrap { height: 6px; background: rgba(255,255,255,0.07); border-radius: 100px; overflow: hidden; }
    .cap-bar { height: 100%; border-radius: 100px; transition: width 0.3s; }
    .cap-green { background: #10b981; }
    .cap-amber { background: var(--amber); }
    .cap-rose { background: var(--rose); }

    /* Allocation group */
    .slot-group {
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .slot-group-header {
      padding: 14px 20px;
      background: var(--navy-4);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .slot-group-name { font-size: 13px; font-weight: 700; font-family: 'Space Mono', monospace; }
    .slot-group-body { padding: 12px 20px; }
    .order-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--navy-4);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      margin: 4px;
      transition: border-color 0.15s;
    }
    .order-chip:hover { border-color: rgba(255,255,255,0.15); }

    /* Supabase code section */
    .code-block {
      background: #060910;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #94a3b8;
      overflow-x: auto;
      white-space: pre;
      line-height: 1.7;
    }
    .code-keyword { color: #7dd3fc; }
    .code-string { color: #86efac; }
    .code-comment { color: #475569; }
    .code-fn { color: #f0abfc; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .main-content { margin-left: 0; }
    }

    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;

    // ── Supabase mock client ────────────────────────────────────────────────
    // In production, replace with:
    //   import { createClient } from '@supabase/supabase-js'
    //   const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    const SUPABASE_URL = 'https://your-project.supabase.co';
    const SUPABASE_ANON_KEY = 'your-anon-key';

    // ── Seed data ───────────────────────────────────────────────────────────
    const INITIAL_SLOTS = [
      { id: 'ts-1', label: '08:00–10:00', start: '08:00', end: '10:00', max_capacity: 10, current_capacity: 9 },
      { id: 'ts-2', label: '10:00–12:00', start: '10:00', end: '12:00', max_capacity: 10, current_capacity: 6 },
      { id: 'ts-3', label: '12:00–14:00', start: '12:00', end: '14:00', max_capacity: 10, current_capacity: 10 },
      { id: 'ts-4', label: '14:00–16:00', start: '14:00', end: '16:00', max_capacity: 10, current_capacity: 3 },
      { id: 'ts-5', label: '16:00–18:00', start: '16:00', end: '18:00', max_capacity: 10, current_capacity: 7 },
      { id: 'ts-6', label: '18:00–20:00', start: '18:00', end: '20:00', max_capacity: 10, current_capacity: 1 },
    ];

    const INITIAL_ORDERS = [
      { id: 'ORD-1001', customer_name: 'Coastal Exports Ltd', order_type: 'Express', slot_id: 'ts-1', status: 'Allocated', created_at: '2025-03-16 07:42' },
      { id: 'ORD-1002', customer_name: 'Pacific Freight Co', order_type: 'Standard', slot_id: 'ts-2', status: 'Allocated', created_at: '2025-03-16 08:15' },
      { id: 'ORD-1003', customer_name: 'NorthStar Logistics', order_type: 'Bulk', slot_id: 'ts-3', status: 'Allocated', created_at: '2025-03-16 09:00' },
      { id: 'ORD-1004', customer_name: 'SkyBridge Carriers', order_type: 'Express', slot_id: 'ts-1', status: 'Allocated', created_at: '2025-03-16 09:12' },
      { id: 'ORD-1005', customer_name: 'MidOcean Traders', order_type: 'Standard', slot_id: 'ts-4', status: 'Pending', created_at: '2025-03-16 09:30' },
      { id: 'ORD-1006', customer_name: 'Delta Dispatch Inc', order_type: 'Refrigerated', slot_id: 'ts-5', status: 'Allocated', created_at: '2025-03-16 10:01' },
    ];

    // ── Mock Supabase API calls ──────────────────────────────────────────────
    // These simulate real Supabase SDK calls. In production uncomment the real calls.
    const supabaseAPI = {
      // INSERT order → orders table
      insertOrder: async (order) => {
        // REAL: const { data, error } = await supabase.from('orders').insert([order]).select()
        await new Promise(r => setTimeout(r, 400));
        return { data: order, error: null };
      },
      // UPDATE time_slot capacity
      incrementSlotCapacity: async (slotId) => {
        // REAL: const { data, error } = await supabase.rpc('increment_slot_capacity', { slot_id: slotId })
        await new Promise(r => setTimeout(r, 200));
        return { data: true, error: null };
      },
      // INSERT order_allocation record
      insertAllocation: async (allocation) => {
        // REAL: const { data, error } = await supabase.from('order_allocations').insert([allocation]).select()
        await new Promise(r => setTimeout(r, 200));
        return { data: allocation, error: null };
      },
      // UPDATE order status to Cancelled
      cancelOrder: async (orderId) => {
        // REAL: const { data, error } = await supabase.from('orders').update({ status: 'Cancelled' }).eq('id', orderId)
        await new Promise(r => setTimeout(r, 300));
        return { data: true, error: null };
      },
    };

    function findAvailableSlot(slots) {
      return slots.find(s => s.current_capacity < s.max_capacity) || null;
    }

    // ── Icons ───────────────────────────────────────────────────────────────
    const Icon = {
      Dashboard: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="nav-icon"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
      Plus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="nav-icon"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      List: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="nav-icon"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg>,
      Clock: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="nav-icon"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>,
      Network: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="nav-icon"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><line x1="12" y1="7" x2="12" y2="14"/><line x1="12" y1="14" x2="5" y2="17"/><line x1="12" y1="14" x2="19" y2="17"/></svg>,
      Code: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="nav-icon"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>,
      Check: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg>,
    };

    // ── Page: Dashboard ─────────────────────────────────────────────────────
    function Dashboard({ orders, slots }) {
      const total = orders.length;
      const allocated = orders.filter(o => o.status === 'Allocated').length;
      const pending = orders.filter(o => o.status === 'Pending').length;
      const full = slots.filter(s => s.current_capacity >= s.max_capacity).length;

      const chartData = slots.map(s => ({
        name: s.label,
        used: s.current_capacity,
        remaining: s.max_capacity - s.current_capacity,
        pct: Math.round((s.current_capacity / s.max_capacity) * 100),
      }));

      const getBarColor = (pct) => pct >= 100 ? '#f43f5e' : pct >= 80 ? '#f59e0b' : '#10b981';

      return (
        <div className="fade-in">
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginBottom: 24 }}>
            {[
              { label: 'Total Orders', value: total, color: 'amber', delta: '+4 today', icon: '📦' },
              { label: 'Allocated', value: allocated, color: 'green', delta: `${Math.round(allocated/total*100)}% fill rate`, icon: '✅' },
              { label: 'Pending', value: pending, color: 'teal', delta: 'awaiting slot', icon: '⏳' },
              { label: 'Slots Full', value: full, color: 'rose', delta: `of ${slots.length} slots`, icon: '🚫' },
            ].map((s, i) => (
              <div key={i} className={`stat-card ${s.color}`}>
                <div className="stat-icon" style={{ fontSize: 48 }}>{s.icon}</div>
                <div className="stat-label">{s.label}</div>
                <div className="stat-value" style={{ color: s.color === 'amber' ? 'var(--amber)' : s.color === 'green' ? '#10b981' : s.color === 'teal' ? '#14b8a6' : '#f43f5e' }}>{s.value}</div>
                <div className="stat-delta mono">{s.delta}</div>
              </div>
            ))}
          </div>

          <div className="chart-card">
            <div className="chart-title">Time Slot Capacity Utilization</div>
            <div className="chart-sub">Orders allocated per slot · {new Date().toLocaleDateString('en-GB', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}</div>
            <ResponsiveContainer width="100%" height={260}>
              <BarChart data={chartData} barSize={36} margin={{ left: -10, right: 10, bottom: 0 }}>
                <CartesianGrid vertical={false} stroke="rgba(255,255,255,0.05)" />
                <XAxis dataKey="name" tick={{ fill: '#64748b', fontSize: 11, fontFamily: 'Space Mono' }} axisLine={false} tickLine={false} />
                <YAxis tick={{ fill: '#64748b', fontSize: 11, fontFamily: 'Space Mono' }} axisLine={false} tickLine={false} domain={[0, 10]} />
                <Tooltip
                  contentStyle={{ background: '#0d1428', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 8, fontFamily: 'Space Mono', fontSize: 12 }}
                  labelStyle={{ color: '#f59e0b', marginBottom: 4 }}
                  itemStyle={{ color: '#94a3b8' }}
                  cursor={{ fill: 'rgba(255,255,255,0.03)' }}
                  formatter={(v, n) => [v, n === 'used' ? 'Allocated' : 'Remaining']}
                />
                <Bar dataKey="used" name="used" radius={[4, 4, 0, 0]}>
                  {chartData.map((d, i) => <Cell key={i} fill={getBarColor(d.pct)} />)}
                </Bar>
                <Bar dataKey="remaining" name="remaining" radius={[4, 4, 0, 0]} fill="rgba(255,255,255,0.06)" />
              </BarChart>
            </ResponsiveContainer>
            <div style={{ display: 'flex', gap: 20, marginTop: 12 }}>
              {[['#10b981','Available (<80%)'], ['#f59e0b','Almost Full (≥80%)'], ['#f43f5e','Full (100%)']].map(([c, l]) => (
                <div key={l} style={{ display:'flex', alignItems:'center', gap:6, fontSize:11, color:'var(--text-muted)', fontFamily:'Space Mono' }}>
                  <div style={{ width:10, height:10, borderRadius:2, background:c }}/>
                  {l}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── Page: Create Order ──────────────────────────────────────────────────
    function CreateOrder({ orders, setOrders, slots, setSlots }) {
      const [form, setForm] = useState({ customer_name: '', order_type: 'Standard' });
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');

      const handleSubmit = async () => {
        if (!form.customer_name.trim()) { setError('Customer name is required.'); return; }
        setError(''); setLoading(true); setResult(null);

        const slot = findAvailableSlot(slots);
        if (!slot) { setError('All time slots are full. Please try again later.'); setLoading(false); return; }

        const newOrder = {
          id: `ORD-${1000 + orders.length + 1}`,
          customer_name: form.customer_name.trim(),
          order_type: form.order_type,
          slot_id: slot.id,
          status: 'Allocated',
          created_at: new Date().toLocaleString('sv').slice(0,16),
        };

        // Supabase API calls (mocked)
        await supabaseAPI.insertOrder(newOrder);
        await supabaseAPI.incrementSlotCapacity(slot.id);
        await supabaseAPI.insertAllocation({ order_id: newOrder.id, slot_id: slot.id, allocated_at: newOrder.created_at });

        setOrders(prev => [newOrder, ...prev]);
        setSlots(prev => prev.map(s => s.id === slot.id ? { ...s, current_capacity: s.current_capacity + 1 } : s));
        setResult({ order: newOrder, slot });
        setForm({ customer_name: '', order_type: 'Standard' });
        setLoading(false);
      };

      return (
        <div className="fade-in">
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24, alignItems: 'start' }}>
            <div className="form-card">
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 4 }}>New Order</div>
                <div className="mono" style={{ fontSize: 11, color: 'var(--text-muted)' }}>System will auto-assign the next available time slot</div>
              </div>

              {error && (
                <div style={{ background:'rgba(244,63,94,0.08)', border:'1px solid rgba(244,63,94,0.2)', borderRadius:8, padding:'10px 14px', marginBottom:16, fontSize:13, color:'#f43f5e' }}>
                  ⚠ {error}
                </div>
              )}

              <div className="form-group">
                <label className="form-label">Customer Name</label>
                <input
                  className="form-input"
                  placeholder="e.g. Acme Shipping Corp"
                  value={form.customer_name}
                  onChange={e => setForm(f => ({ ...f, customer_name: e.target.value }))}
                  onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                />
              </div>

              <div className="form-group">
                <label className="form-label">Order Type</label>
                <select className="form-select" value={form.order_type} onChange={e => setForm(f => ({ ...f, order_type: e.target.value }))}>
                  {['Standard','Express','Bulk','Refrigerated','Fragile','Hazardous'].map(t => <option key={t}>{t}</option>)}
                </select>
              </div>

              <button className="btn-primary" onClick={handleSubmit} disabled={loading} style={{ marginTop: 8 }}>
                {loading ? (
                  <><span style={{ display:'inline-block', width:14, height:14, border:'2px solid var(--navy)', borderTopColor:'transparent', borderRadius:'50%', animation:'spin 0.6s linear infinite' }} /> Allocating…</>
                ) : (
                  <><Icon.Check /> Submit Order</>
                )}
              </button>

              {result && (
                <div className="allocation-result">
                  <div className="allocation-label">✓ Slot Allocated Successfully</div>
                  <div className="allocation-slot">{result.slot.label}</div>
                  <div className="allocation-detail">Order ID: {result.order.id} · Type: {result.order.order_type}</div>
                  <div className="allocation-detail" style={{ marginTop:4 }}>Capacity: {result.slot.current_capacity + 1} / {result.slot.max_capacity}</div>
                </div>
              )}
            </div>

            {/* Supabase schema hint */}
            <div>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 12, color: 'var(--text-muted)' }}>SUPABASE SCHEMA & API REFERENCE</div>

              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 11, color: 'var(--amber)', fontFamily: 'Space Mono', marginBottom: 6 }}>// SQL: Create Tables</div>
                <div className="code-block">{`<span class="code-comment">-- orders table</span>
<span class="code-keyword">CREATE TABLE</span> orders (
  id          <span class="code-keyword">TEXT PRIMARY KEY</span>,
  customer_name <span class="code-keyword">TEXT NOT NULL</span>,
  order_type  <span class="code-keyword">TEXT</span>,
  slot_id     <span class="code-keyword">TEXT REFERENCES</span> time_slots(id),
  status      <span class="code-keyword">TEXT DEFAULT</span> <span class="code-string">'Pending'</span>,
  created_at  <span class="code-keyword">TIMESTAMPTZ DEFAULT NOW()</span>
);

<span class="code-comment">-- time_slots table</span>
<span class="code-keyword">CREATE TABLE</span> time_slots (
  id               <span class="code-keyword">TEXT PRIMARY KEY</span>,
  start_time       <span class="code-keyword">TIME NOT NULL</span>,
  end_time         <span class="code-keyword">TIME NOT NULL</span>,
  max_capacity     <span class="code-keyword">INT DEFAULT</span> 10,
  current_capacity <span class="code-keyword">INT DEFAULT</span> 0
);

<span class="code-comment">-- order_allocations table</span>
<span class="code-keyword">CREATE TABLE</span> order_allocations (
  id         <span class="code-keyword">SERIAL PRIMARY KEY</span>,
  order_id   <span class="code-keyword">TEXT REFERENCES</span> orders(id),
  slot_id    <span class="code-keyword">TEXT REFERENCES</span> time_slots(id),
  allocated_at <span class="code-keyword">TIMESTAMPTZ DEFAULT NOW()</span>
);`}</div>
              </div>

              <div>
                <div style={{ fontSize: 11, color: 'var(--amber)', fontFamily: 'Space Mono', marginBottom: 6 }}>// JS: Insert Order + Allocate</div>
                <div className="code-block">{`<span class="code-comment">// 1. Insert new order</span>
<span class="code-keyword">const</span> { data } = <span class="code-keyword">await</span> supabase
  .<span class="code-fn">from</span>(<span class="code-string">'orders'</span>)
  .<span class="code-fn">insert</span>([{ customer_name, order_type, slot_id, status: <span class="code-string">'Allocated'</span> }])
  .<span class="code-fn">select</span>();

<span class="code-comment">// 2. Increment slot capacity</span>
<span class="code-keyword">await</span> supabase.<span class="code-fn">rpc</span>(<span class="code-string">'increment_slot_capacity'</span>, { slot_id });

<span class="code-comment">// 3. Record allocation</span>
<span class="code-keyword">await</span> supabase
  .<span class="code-fn">from</span>(<span class="code-string">'order_allocations'</span>)
  .<span class="code-fn">insert</span>([{ order_id: data[0].id, slot_id }]);

<span class="code-comment">// 4. Cancel an order</span>
<span class="code-keyword">await</span> supabase
  .<span class="code-fn">from</span>(<span class="code-string">'orders'</span>)
  .<span class="code-fn">update</span>({ status: <span class="code-string">'Cancelled'</span> })
  .<span class="code-fn">eq</span>(<span class="code-string">'id'</span>, orderId);`}</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Page: Orders ────────────────────────────────────────────────────────
    function Orders({ orders, setOrders, slots, setSlots }) {
      const [filter, setFilter] = useState('All');

      const cancelOrder = async (orderId) => {
        await supabaseAPI.cancelOrder(orderId);
        const order = orders.find(o => o.id === orderId);
        if (order && order.status === 'Allocated') {
          setSlots(prev => prev.map(s => s.id === order.slot_id ? { ...s, current_capacity: Math.max(0, s.current_capacity - 1) } : s));
        }
        setOrders(prev => prev.map(o => o.id === orderId ? { ...o, status: 'Cancelled' } : o));
      };

      const filtered = filter === 'All' ? orders : orders.filter(o => o.status === filter);
      const getSlotLabel = (sid) => slots.find(s => s.id === sid)?.label || '—';
      const statuses = ['All', 'Allocated', 'Pending', 'Cancelled'];

      return (
        <div className="fade-in">
          <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
            {statuses.map(s => (
              <button key={s} onClick={() => setFilter(s)} style={{
                padding:'7px 16px', borderRadius:8, border:`1px solid ${filter===s?'rgba(245,158,11,0.3)':'var(--border)'}`,
                background: filter===s ? 'var(--amber-dim)' : 'var(--navy-3)',
                color: filter===s ? 'var(--amber)' : 'var(--text-muted)',
                fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'Syne, sans-serif',
                transition: 'all 0.15s',
              }}>
                {s} {s === 'All' ? `(${orders.length})` : `(${orders.filter(o => o.status === s).length})`}
              </button>
            ))}
          </div>

          <div className="table-wrap">
            <div className="table-header">
              <div className="table-title">Order Registry</div>
              <div className="table-count mono">{filtered.length} records</div>
            </div>
            <div style={{ overflowX: 'auto' }}>
              <table className="data-table">
                <thead>
                  <tr>
                    {['Order ID','Customer Name','Allocated Slot','Order Type','Status','Created Time','Action'].map(h => <th key={h}>{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {filtered.length === 0 && (
                    <tr><td colSpan={7} style={{ textAlign:'center', color:'var(--text-muted)', padding:32 }}>No orders found</td></tr>
                  )}
                  {filtered.map(o => (
                    <tr key={o.id}>
                      <td><span className="mono" style={{ color:'var(--amber)', fontSize:12 }}>{o.id}</span></td>
                      <td style={{ fontWeight:600 }}>{o.customer_name}</td>
                      <td><span className="mono" style={{ fontSize:12 }}>{getSlotLabel(o.slot_id)}</span></td>
                      <td>
                        <span className="pill pill-gray">{o.order_type}</span>
                      </td>
                      <td>
                        <span className={`pill ${o.status==='Allocated'?'pill-green':o.status==='Pending'?'pill-amber':'pill-rose'}`}>
                          {o.status}
                        </span>
                      </td>
                      <td><span className="mono" style={{ fontSize:11, color:'var(--text-muted)' }}>{o.created_at}</span></td>
                      <td>
                        {o.status !== 'Cancelled' ? (
                          <button className="btn-danger" onClick={() => cancelOrder(o.id)}>Cancel</button>
                        ) : (
                          <span className="mono" style={{ fontSize:11, color:'var(--text-muted)' }}>—</span>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ── Page: Time Slot Monitor ─────────────────────────────────────────────
    function SlotMonitor({ slots }) {
      const getColor = (s) => {
        const pct = s.current_capacity / s.max_capacity;
        return pct >= 1 ? 'rose' : pct >= 0.8 ? 'amber' : 'green';
      };

      return (
        <div className="fade-in">
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16, marginBottom: 24 }}>
            {[
              { label: 'Available Slots', value: slots.filter(s => s.current_capacity < s.max_capacity * 0.8).length, color: '#10b981' },
              { label: 'Almost Full', value: slots.filter(s => s.current_capacity >= s.max_capacity * 0.8 && s.current_capacity < s.max_capacity).length, color: '#f59e0b' },
              { label: 'Fully Booked', value: slots.filter(s => s.current_capacity >= s.max_capacity).length, color: '#f43f5e' },
            ].map(s => (
              <div key={s.label} style={{ background:'var(--navy-3)', border:`1px solid var(--border)`, borderRadius:12, padding:'16px 20px', display:'flex', alignItems:'center', gap:16 }}>
                <div style={{ width:40, height:40, borderRadius:10, background:`${s.color}22`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20 }}>
                  {s.color === '#10b981' ? '🟢' : s.color === '#f59e0b' ? '🟡' : '🔴'}
                </div>
                <div>
                  <div style={{ fontSize:24, fontWeight:800, color:s.color }}>{s.value}</div>
                  <div className="mono" style={{ fontSize:11, color:'var(--text-muted)' }}>{s.label}</div>
                </div>
              </div>
            ))}
          </div>

          <div className="table-wrap">
            <div className="table-header">
              <div className="table-title">Time Slot Capacity Monitor</div>
              <div className="table-count mono">{slots.length} configured slots</div>
            </div>
            <table className="data-table">
              <thead>
                <tr>
                  {['Status','Slot Start','Slot End','Max Capacity','Current','Remaining','Utilization'].map(h => <th key={h}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {slots.map(s => {
                  const c = getColor(s);
                  const pct = Math.round((s.current_capacity / s.max_capacity) * 100);
                  const rem = s.max_capacity - s.current_capacity;
                  return (
                    <tr key={s.id}>
                      <td>
                        <div style={{ width:10, height:10, borderRadius:'50%', background: c==='green'?'#10b981':c==='amber'?'#f59e0b':'#f43f5e', boxShadow:`0 0 8px ${c==='green'?'#10b981':c==='amber'?'#f59e0b':'#f43f5e'}` }} />
                      </td>
                      <td><span className="mono" style={{ fontSize:13, fontWeight:700 }}>{s.start}</span></td>
                      <td><span className="mono" style={{ fontSize:13, fontWeight:700 }}>{s.end}</span></td>
                      <td><span className="mono">{s.max_capacity}</span></td>
                      <td>
                        <span className={`pill ${c==='green'?'pill-green':c==='amber'?'pill-amber':'pill-rose'}`}>
                          {s.current_capacity}
                        </span>
                      </td>
                      <td><span className="mono" style={{ color: rem===0 ? '#f43f5e' : '#10b981' }}>{rem}</span></td>
                      <td style={{ minWidth: 140 }}>
                        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                          <div className="cap-bar-wrap" style={{ flex:1 }}>
                            <div className={`cap-bar ${c==='green'?'cap-green':c==='amber'?'cap-amber':'cap-rose'}`} style={{ width: `${pct}%` }} />
                          </div>
                          <span className="mono" style={{ fontSize:11, minWidth:34, textAlign:'right', color: c==='green'?'#10b981':c==='amber'?'#f59e0b':'#f43f5e' }}>{pct}%</span>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ── Page: Allocation Monitor ────────────────────────────────────────────
    function AllocationMonitor({ orders, slots }) {
      const activeOrders = orders.filter(o => o.status === 'Allocated' || o.status === 'Pending');

      return (
        <div className="fade-in">
          <div style={{ marginBottom: 20, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div>
              <div style={{ fontSize:14, fontWeight:700 }}>Orders grouped by time slot allocation</div>
              <div className="mono" style={{ fontSize:11, color:'var(--text-muted)', marginTop:2 }}>{activeOrders.length} active orders across {slots.length} slots</div>
            </div>
          </div>

          {slots.map(slot => {
            const slotOrders = activeOrders.filter(o => o.slot_id === slot.id);
            const pct = Math.round((slot.current_capacity / slot.max_capacity) * 100);
            const isFull = slot.current_capacity >= slot.max_capacity;
            const isAlmost = pct >= 80 && !isFull;

            return (
              <div key={slot.id} className="slot-group">
                <div className="slot-group-header">
                  <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                    <div style={{ width:8, height:8, borderRadius:'50%', background: isFull?'#f43f5e':isAlmost?'#f59e0b':'#10b981', boxShadow:`0 0 8px ${isFull?'#f43f5e':isAlmost?'#f59e0b':'#10b981'}` }}/>
                    <div className="slot-group-name">{slot.label}</div>
                    <span className={`pill ${isFull?'pill-rose':isAlmost?'pill-amber':'pill-green'}`} style={{ fontSize:10 }}>
                      {isFull ? 'FULL' : isAlmost ? 'ALMOST FULL' : 'AVAILABLE'}
                    </span>
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, minWidth:160 }}>
                      <div className="cap-bar-wrap" style={{ flex:1 }}>
                        <div className={`cap-bar ${isFull?'cap-rose':isAlmost?'cap-amber':'cap-green'}`} style={{ width:`${pct}%` }}/>
                      </div>
                      <span className="mono" style={{ fontSize:11, color:'var(--text-muted)', minWidth:60 }}>{slot.current_capacity}/{slot.max_capacity}</span>
                    </div>
                  </div>
                </div>
                <div className="slot-group-body">
                  {slotOrders.length === 0 ? (
                    <div className="mono" style={{ fontSize:11, color:'var(--text-muted)', padding:'8px 0' }}>No active orders in this slot</div>
                  ) : (
                    <div style={{ display:'flex', flexWrap:'wrap' }}>
                      {slotOrders.map(o => (
                        <div key={o.id} className="order-chip">
                          <div style={{ width:6, height:6, borderRadius:'50%', background: o.status==='Allocated' ? '#10b981' : '#f59e0b' }}/>
                          <span style={{ color:'var(--amber)' }}>{o.id}</span>
                          <span style={{ color:'var(--text-muted)' }}>·</span>
                          <span>{o.customer_name}</span>
                          <span className="pill pill-gray" style={{ fontSize:10, padding:'1px 6px' }}>{o.order_type}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ── App Shell ───────────────────────────────────────────────────────────
    function App() {
      const [page, setPage] = useState('dashboard');
      const [orders, setOrders] = useState(INITIAL_ORDERS);
      const [slots, setSlots] = useState(INITIAL_SLOTS);

      const navItems = [
        { id: 'dashboard', label: 'Dashboard', icon: <Icon.Dashboard /> },
        { id: 'create', label: 'Create Order', icon: <Icon.Plus /> },
        { id: 'orders', label: 'Orders', icon: <Icon.List /> },
        { id: 'slots', label: 'Slot Monitor', icon: <Icon.Clock /> },
        { id: 'allocation', label: 'Allocation Map', icon: <Icon.Network /> },
      ];

      const pageTitles = {
        dashboard: { title: 'Operations Dashboard', sub: 'REAL-TIME OVERVIEW' },
        create: { title: 'Create Order', sub: 'TIME-BASED ALLOCATION' },
        orders: { title: 'Order Registry', sub: 'FULL ORDER HISTORY' },
        slots: { title: 'Slot Monitor', sub: 'CAPACITY TRACKING' },
        allocation: { title: 'Allocation Map', sub: 'SLOT-ORDER GROUPING' },
      };

      const allocated = orders.filter(o => o.status === 'Allocated').length;
      const pending = orders.filter(o => o.status === 'Pending').length;

      return (
        <div>
          {/* Sidebar */}
          <div className="sidebar">
            <div className="sidebar-logo">
              <div className="logo-mark">LF</div>
              <div className="logo-text">LogiFlow</div>
              <div className="logo-sub">Distribution System</div>
            </div>
            <div className="nav-section">
              <div className="nav-section-label">Navigation</div>
              {navItems.map(item => (
                <div key={item.id} className={`nav-item${page === item.id ? ' active' : ''}`} onClick={() => setPage(item.id)}>
                  {item.icon}
                  {item.label}
                  {item.id === 'orders' && pending > 0 && (
                    <div style={{ marginLeft:'auto', background:'var(--amber)', color:'var(--navy)', fontSize:10, fontWeight:800, width:18, height:18, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Space Mono' }}>{pending}</div>
                  )}
                </div>
              ))}

              <div className="nav-section-label" style={{ marginTop: 16 }}>Quick Stats</div>
              <div style={{ padding:'8px 8px', display:'flex', flexDirection:'column', gap:8 }}>
                {[
                  { label:'Allocated', val: allocated, color:'#10b981' },
                  { label:'Pending', val: pending, color:'#f59e0b' },
                  { label:'Slots Full', val: slots.filter(s=>s.current_capacity>=s.max_capacity).length, color:'#f43f5e' },
                ].map(s => (
                  <div key={s.label} style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <span className="mono" style={{ fontSize:11, color:'var(--text-muted)' }}>{s.label}</span>
                    <span className="mono" style={{ fontSize:12, fontWeight:700, color:s.color }}>{s.val}</span>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ padding:'16px 20px', borderTop:'1px solid var(--border)' }}>
              <div className="mono" style={{ fontSize:10, color:'var(--text-muted)', marginBottom:4 }}>CONNECTED TO</div>
              <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                <div style={{ width:6, height:6, borderRadius:'50%', background:'#10b981', animation:'pulse 2s infinite' }}/>
                <span className="mono" style={{ fontSize:11, color:'#10b981' }}>Supabase PostgreSQL</span>
              </div>
            </div>
          </div>

          {/* Main */}
          <div className="main-content">
            <div className="topbar">
              <div>
                <div className="page-title">{pageTitles[page].title}</div>
                <div className="page-subtitle mono">{pageTitles[page].sub}</div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                <div className="mono" style={{ fontSize:11, color:'var(--text-muted)' }}>
                  {new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })}
                </div>
                <div className="status-badge"><div className="status-dot"/>SYSTEM LIVE</div>
              </div>
            </div>

            <div className="page-content">
              {page === 'dashboard' && <Dashboard orders={orders} slots={slots} />}
              {page === 'create' && <CreateOrder orders={orders} setOrders={setOrders} slots={slots} setSlots={setSlots} />}
              {page === 'orders' && <Orders orders={orders} setOrders={setOrders} slots={slots} setSlots={setSlots} />}
              {page === 'slots' && <SlotMonitor slots={slots} />}
              {page === 'allocation' && <AllocationMonitor orders={orders} slots={slots} />}
            </div>
          </div>

          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
